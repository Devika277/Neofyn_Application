flutter_launcher_icons:
  android: true
  ios: true

  image_path: "assets/images/logo_white.png"

  # Android adaptive icon
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/logo_white.png"

  # iOS fix (removes transparency issues)
  remove_alpha_ios: true

  # Optional: ensures background fill for non-adaptive icons
  background_color: "#000000"
